<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ONT Deployer | Telkom Helper</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f6; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; background: #ffffff; padding: 20px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
        h2 { color: #2d3748; margin-bottom: 25px; font-weight: 700; text-align: center; }
        .input-group { margin-bottom: 15px; }
        label { font-size: 11px; font-weight: 700; color: #718096; margin-bottom: 6px; display: block; text-transform: uppercase; }
        input, textarea { width: 100%; padding: 14px; border: 1.5px solid #edf2f7; border-radius: 10px; box-sizing: border-box; background: #f8fafc; font-size: 16px; }
        
        button#proses { width: 100%; padding: 14px; background: #2d3748; color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 16px; }
        button#proses:hover { background: #1a202c; }
        
        .card { background: #ffffff; border: 1px solid #edf2f7; border-radius: 12px; padding: 18px; margin-top: 15px; }
        .btn-wa, .btn-salin {
            display: block; width: 100%; text-align: center; padding: 12px; border-radius: 8px; font-weight: 600; font-size: 14px; margin-top: 10px; box-sizing: border-box; cursor: pointer; text-decoration: none; border: 1px solid transparent;
        }
        .btn-wa { background: #e6fffa; color: #2f855a; border-color: #b2f5ea; }
        .btn-salin { background: #f7fafc; color: #a0aec0; border-color: #e2e8f0; }
        .btn-salin:hover { background: #fff5f5; color: #e53e3e; border-color: #feb2b2; }

        .footer-line { margin: 30px 0; border-top: 1px solid #edf2f7; }
        .watermark { font-size: 12px; color: #a0aec0; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>ONT Deployer</h2>
    <div class="input-group">
        <label>Nama Teknisi</label>
        <input type="text" id="namaTeknisi" placeholder="Masukkan nama...">
    </div>
    <div class="input-group">
        <label>Data Tiket</label>
        <textarea id="rawInput" rows="5" placeholder="Paste detail tiket di sini..."></textarea>
    </div>
    <button id="proses" onclick="prosesTiket()">PROSES TIKET</button>

    <div id="tiketList"></div>
    
    <div class="footer-line"></div>
    <div class="watermark">
        Developer: <a href="https://portofolio-ezra-samson.vercel.app/" target="_blank" style="text-decoration: none; color: #4a5568; font-weight: bold;">ezra.dev</a>
    </div>
</div>

<script>
function prosesTiket() {
    const namaTeknisi = document.getElementById('namaTeknisi').value || "Teknisi";
    const rawText = document.getElementById('rawInput').value;
    const container = document.getElementById('tiketList');
    container.innerHTML = '';
    
    // Split tiket berdasarkan baris kosong
    rawText.split(/\n\s*\n/).forEach(block => {
        if(block.trim() === '') return;
        
        let noInternet, namaLengkap, noHp;

        // CEK FORMAT BARU (dengan titik dua)
        if (block.includes("No. Layanan")) {
            noInternet = (block.match(/No\. Layanan\s*:\s*(\d+)/i) || [])[1];
            namaLengkap = (block.match(/Nama pelanggan\s*:\s*(.*)/i) || [])[1];
            noHp = (block.match(/wa\.me\/(\d+)/i) || [])[1];
        } 
        // CEK FORMAT LAMA (berbasis kolom/spasi)
        else {
            const p = block.split(/\s{2,}/);
            noInternet = p[0];
            noHp = (p[4] || '').replace(/^0/, '62');
            namaLengkap = (p[6] || '') + ' ' + (p[7] || '');
        }

        if (noInternet) {
            const template = `Selamat Pagi Bapak/Ibu,
Perkenalkan, saya ${namaTeknisi} dari Telkom Indonesia (STO TELKOM PUGERAN).

Kami menghubungi Bapak/Ibu terkait program penggantian perangkat/modem ONT lama ke ONT/MODEM WIFI baru secara GRATIS, dengan detail pelanggan sbb:

${block.trim()}

Proses penggantian akan dilakukan langsung oleh teknisi resmi Telkom. Apakah Bapak/Ibu bersedia dijadwalkan untuk penggantian ONT/MODEM WIFInya?

Jika berkenan mohon dibantu share lokasi dan foto lokasinya.

Terima kasih atas perhatian dan kerja samanya.`;

            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<div style="font-weight:700; color:#2d3748;">${namaLengkap || "Pelanggan"}</div>
                <div style="font-size:12px; color:#718096; margin-bottom:10px;">ID: ${noInternet}</div>
                <a href="https://wa.me/${noHp}?text=${encodeURIComponent(template)}" target="_blank" class="btn-wa">Kirim Pesan WhatsApp</a>
                <button onclick="copyLaporan('${block.trim().replace(/\n/g, '\\n').replace(/'/g, "\\'")}')" class="btn-salin">Salin Data Lengkap</button>`;
            container.appendChild(card);
        }
    });
}

function copyLaporan(teks) {
    navigator.clipboard.writeText(teks).then(() => {
        alert("Data berhasil disalin!");
    });
}
</script>
</body>
</html>
